<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Briefer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="topbar">
    <div id="topbar-main">
      <span id="dir-info"></span>
      <div id="controls">
        <button id="edit-sources-btn" title="Edit scan paths">Paths...</button>
        <label>
          Highlight:
          <select id="tag-filter">
            <option value="both">Both</option>
            <option value="prose">Prose only</option>
            <option value="code">Code only</option>
          </select>
        </label>
        <label>
          Min occurrences:
          <input type="range" id="min-occurrences" min="2" max="10" value="2">
          <span id="min-occ-value">2</span>
        </label>
      </div>
    </div>
    <div id="sources-editor" style="display:none">
      <div id="sources-grid">
        <div class="sources-col">
          <label class="sources-label">Include patterns</label>
          <div id="include-list"></div>
          <button id="add-include-btn" class="sources-add-btn">+ Add</button>
        </div>
        <div class="sources-col">
          <label class="sources-label">Exclude patterns</label>
          <div id="exclude-list"></div>
          <button id="add-exclude-btn" class="sources-add-btn">+ Add</button>
        </div>
      </div>
      <div id="sources-actions">
        <span id="sources-dir" style="color:#888;font-size:11px"></span>
        <div>
          <button id="apply-sources-btn">Rescan</button>
          <button id="cancel-sources-btn">Cancel</button>
        </div>
      </div>
    </div>
  </header>
  <main id="panels">
    <aside id="left-panel">
      <div id="left-tabs">
        <button class="left-tab active" data-tab="files">Files</button>
        <button class="left-tab" data-tab="ngrams">N-grams</button>
      </div>
      <div id="files-tab">
        <input type="text" id="file-search" placeholder="Filter files...">
        <div id="files"></div>
      </div>
      <div id="ngrams-tab" style="display:none">
        <div id="ngrams-toolbar">
          <input type="text" id="ngram-search" placeholder="Filter n-grams...">
          <select id="ngram-sort">
            <option value="count-desc">Most occurrences</option>
            <option value="count-asc">Fewest occurrences</option>
            <option value="alpha-asc">A → Z</option>
            <option value="alpha-desc">Z → A</option>
            <option value="length-desc">Longest first</option>
            <option value="length-asc">Shortest first</option>
            <option value="files-desc">Most files</option>
          </select>
        </div>
        <div id="ngram-list"></div>
      </div>
    </aside>
    <section id="editor-panel">
      <div id="editor-toolbar">
        <span id="current-file"></span>
        <button id="merge-selection-btn" disabled>Merge selection...</button>
        <button id="save-btn" disabled>Save to disk</button>
      </div>
      <div id="search-results" style="display:none"></div>
      <div id="editor-container">
        <div id="editor"></div>
        <div id="compare-panel" style="display:none">
          <div id="compare-toolbar">
            <span id="compare-file"></span>
            <button id="close-compare-btn">Close</button>
          </div>
          <div id="compare-editor"></div>
        </div>
      </div>
    </section>
    <aside id="context-panel">
      <div id="context-content">
        <p class="placeholder">Select a file to view redundancy info.</p>
      </div>
    </aside>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/markdown/markdown.min.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
